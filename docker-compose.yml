version: "3.9"

services:
  nkorebank:
    build: .
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: "8080"
      DATABASE_URL: "postgres://nkorebank:nkorebank_secret@postgres:5432/nkorebank?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
      JWT_SECRET: "change-me-in-production-use-vault"
      JWT_ISSUER: "nkore-bank"
      AES_ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef"
      KAFKA_BROKERS: "kafka:9092"
      OTEL_EXPORTER_ENDPOINT: "otel-collector:4317"
      RATE_LIMIT_REQUESTS: "100"
      RATE_LIMIT_WINDOW_SEC: "60"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nkorebank
      POSTGRES_USER: nkorebank
      POSTGRES_PASSWORD: nkorebank_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nkorebank"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
